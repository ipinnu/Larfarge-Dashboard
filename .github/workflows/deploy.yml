name: Deploy BPL Dashboard

# Secrets required (only these four):
#   SSH_HOST, SSH_PORT, SSH_USER, SSH_PRIVATE_KEY
# App path / PM2 name are fixed below — not secrets.

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /var/www/larfarge-dashboard
            git fetch origin
            git reset --hard origin/main
            npm install
            NODE_OPTIONS=--max-old-space-size=2048 npm run build
            pm2 restart larfarge-dashboard --update-env
            pm2 save
